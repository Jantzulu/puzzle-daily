<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050504" />
    <meta name="description" content="Puzzle Daily — a daily tactical dungeon puzzle. Place your heroes, outwit the dungeon, and climb the ranks in one run per day." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Puzzle Daily" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Puzzle Daily</title>
    <!-- Google Fonts - loaded in head for reliability -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Amarante&family=Caveat:wght@400;500;600;700&family=Cinzel:wght@400;500;600;700&family=Crimson+Text:wght@400;600;700&family=Faculty+Glyphic&family=Germania+One&family=Grenze+Gotisch:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Jacquard+24&family=Jacquarda+Bastarda+9&family=MedievalSharp&family=Press+Start+2P&family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
  </head>
    <style>
      /* Pre-hydration splash — fades in after a beat so fast loads never see
         it; removed by the app the moment React reveals #root. */
      #splash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#050504;opacity:0;animation:splash-in .4s ease .25s forwards;pointer-events:none}
      #splash .t{font-family:Georgia,'Times New Roman',serif;font-weight:700;font-size:20px;letter-spacing:.35em;text-transform:uppercase;color:#d4a574;animation:splash-pulse 1.6s ease-in-out infinite}
      @keyframes splash-in{to{opacity:1}}
      @keyframes splash-pulse{0%,100%{opacity:.45}50%{opacity:1}}
    </style>
  <body style="background-color:#050504;margin:0">
    <div id="splash" aria-hidden="true"><div class="t">Puzzle&nbsp;Daily</div></div>
    <div id="root" style="opacity:0;transition:opacity .15s ease-in"></div>
    <script>setTimeout(function(){var s=document.getElementById('splash');if(s)s.remove()},10000)</script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
