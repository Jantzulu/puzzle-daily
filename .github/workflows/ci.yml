name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      # Build mode (-b) is REQUIRED: the root tsconfig is Vite's
      # project-references shape (files: [] + references), so plain
      # `tsc --noEmit` type-checks ZERO files and passes vacuously —
      # which is exactly what this step silently did until 2026-07-21.
      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
